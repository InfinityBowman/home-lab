name: fanfic-crawler

services:
  crawler:
    image: ghcr.io/infinitybowman/fanfic-crawler:latest
    container_name: homelab-fanfic-crawler
    command: ["--daemon"]
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:?Set DATABASE_URL in .env}
      - CRAWLER_HEADLESS=true
    volumes:
      - crawler-data:/app/apps/crawler/data
    mem_limit: 2g

volumes:
  crawler-data:
