name: n8n

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:2.9.3
    container_name: homelab-n8n
    restart: unless-stopped
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_POSTGRES_PASSWORD}
      - N8N_HOST=n8n.${BASE_DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - WEBHOOK_URL=https://n8n.${BASE_DOMAIN}/
      - N8N_EDITOR_BASE_URL=https://n8n.${BASE_DOMAIN}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Chicago}
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - homelab
      - n8n-internal
    depends_on:
      n8n-postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homelab-n8n.rule=Host(`n8n.${BASE_DOMAIN}`)"
      - "traefik.http.routers.homelab-n8n.entrypoints=web"
      - "traefik.http.services.homelab-n8n.loadbalancer.server.port=5678"
      - "traefik.http.routers.homelab-n8n.middlewares=secure-chain@file"

  n8n-postgres:
    image: postgres:18
    container_name: homelab-n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_POSTGRES_PASSWORD}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql
    networks:
      - n8n-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  n8n_data:
  n8n_postgres_data:

networks:
  homelab:
    external: true
  n8n-internal:
