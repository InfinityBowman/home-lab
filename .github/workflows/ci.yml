name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: cargo fmt [skip ci]"

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  docker:
    name: Docker Build (API)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [clippy, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f infrastructure/Dockerfile .

  docker-dashboard:
    name: Docker Build (Dashboard)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f dashboard/Dockerfile dashboard

  deploy:
    name: Deploy to Homelab
    runs-on: [self-hosted, homelab]
    if: github.ref == 'refs/heads/main'
    needs: [clippy, test]
    concurrency:
      group: deploy-homelab
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - name: Run deploy script
        run: bash infrastructure/scripts/deploy.sh
