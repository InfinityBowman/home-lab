name: plausible

services:
  plausible:
    image: ghcr.io/plausible/community-edition:v3.2.0
    container_name: homelab-plausible
    restart: unless-stopped
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    environment:
      - BASE_URL=https://plausible.${BASE_DOMAIN}
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY_BASE}
      - DATABASE_URL=postgres://plausible:${PLAUSIBLE_POSTGRES_PASSWORD}@plausible-postgres:5432/plausible
      - CLICKHOUSE_DATABASE_URL=http://plausible-clickhouse:8123/plausible_events
      - DISABLE_REGISTRATION=invite_only
      - TMPDIR=/var/lib/plausible/tmp
    volumes:
      - plausible_data:/var/lib/plausible
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    networks:
      - homelab
      - plausible-internal
    depends_on:
      plausible-postgres:
        condition: service_healthy
      plausible-clickhouse:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homelab-plausible.rule=Host(`plausible.${BASE_DOMAIN}`)"
      - "traefik.http.routers.homelab-plausible.entrypoints=web"
      - "traefik.http.services.homelab-plausible.loadbalancer.server.port=8000"
      - "traefik.http.routers.homelab-plausible.middlewares=secure-chain@file"

  plausible-postgres:
    image: postgres:16-alpine
    container_name: homelab-plausible-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=plausible
      - POSTGRES_USER=plausible
      - POSTGRES_PASSWORD=${PLAUSIBLE_POSTGRES_PASSWORD}
    volumes:
      - plausible_postgres_data:/var/lib/postgresql/data
    networks:
      - plausible-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible -d plausible"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1m

  plausible-clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    container_name: homelab-plausible-clickhouse
    restart: unless-stopped
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    volumes:
      - plausible_clickhouse_data:/var/lib/clickhouse
      - plausible_clickhouse_logs:/var/log/clickhouse-server
      - ./clickhouse/logs.xml:/etc/clickhouse-server/config.d/logs.xml:ro
      - ./clickhouse/ipv4-only.xml:/etc/clickhouse-server/config.d/ipv4-only.xml:ro
      - ./clickhouse/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./clickhouse/default-profile-low-resources-overrides.xml:/etc/clickhouse-server/users.d/default-profile-low-resources-overrides.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - plausible-internal
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 -O - http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 1m

volumes:
  plausible_data:
  plausible_postgres_data:
  plausible_clickhouse_data:
  plausible_clickhouse_logs:

networks:
  homelab:
    external: true
  plausible-internal:
