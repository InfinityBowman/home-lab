services:
  # ─── Reverse Proxy ──────────────────────────────────────────────────────────
  traefik:
    image: traefik:v3.6.9
    container_name: homelab-traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=homelab"
      - "--entrypoints.web.address=:80"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
    ports:
      - "80:80"
      - "127.0.0.1:8080:8080"  # Traefik dashboard (localhost only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - homelab

  # ─── Tunnel Connector (enable with: docker compose --profile tunnel up) ────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: homelab-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?Set CLOUDFLARE_TUNNEL_TOKEN in .env}
    networks:
      - homelab
    depends_on:
      - traefik
    profiles:
      - tunnel

  # ─── PaaS API (Rust Server) ────────────────────────────────────────────────
  paas-api:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
    container_name: homelab-paas-api
    restart: unless-stopped
    group_add:
      - "988"  # Host docker group GID — allows container user to access /var/run/docker.sock
    ports:
      - "127.0.0.1:5170:5170"  # Localhost only — access via Traefik
    environment:
      - DATABASE_URL=sqlite:///data/homelab.db?mode=rwc
      - DOCKER_HOST=unix:///var/run/docker.sock
      - GIT_REPOS_PATH=/git-repos
      - BASE_DOMAIN=${BASE_DOMAIN:-lab.localhost}
      - INTERNAL_HOOK_SECRET=${INTERNAL_HOOK_SECRET:?Set INTERNAL_HOOK_SECRET in .env}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-}
      - CLOUDFLARE_TUNNEL_ID=${CLOUDFLARE_TUNNEL_ID:-}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID:-}
      - PORT=5170
      - RUST_LOG=info,homelab=debug
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../git-repos:/git-repos
      - ../data:/data
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paas-api.rule=Host(`paas.${BASE_DOMAIN:-lab.localhost}`)"
      - "traefik.http.routers.paas-api.entrypoints=web"
      - "traefik.http.services.paas-api.loadbalancer.server.port=5170"
      - "traefik.http.routers.paas-api.middlewares=secure-chain@file"
    depends_on:
      - traefik

  # ─── Dashboard (React SPA) ──────────────────────────────────────────────────
  dashboard:
    build:
      context: ../dashboard
    container_name: homelab-dashboard
    restart: unless-stopped
    environment:
      - API_SECRET=${INTERNAL_HOOK_SECRET:?Set INTERNAL_HOOK_SECRET in .env}
    networks:
      - homelab
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homelab-dashboard.rule=Host(`dashboard.${BASE_DOMAIN:-lab.localhost}`)"
      - "traefik.http.routers.homelab-dashboard.entrypoints=web"
      - "traefik.http.services.homelab-dashboard.loadbalancer.server.port=80"
      - "traefik.http.routers.homelab-dashboard.middlewares=secure-chain@file"
    depends_on:
      - paas-api

networks:
  homelab:
    name: homelab
    driver: bridge
